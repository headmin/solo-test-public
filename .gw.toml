# gw configuration
# Generated by: gw init

private_remote = "origin"
public_remote = "public"
default_branch = "main"
auto_stash = true
locked = true
solo_mode = true

# Patterns to exclude from public publishing
# These files/folders will be removed when running 'gw publish'
exclude_public = [
    ".claude/",
    ".cursor/",
    ".aider/",
    ".agent/",
    "CLAUDE.md",
    "AGENTS.md",
    "doc/",
    "docs/",
    "*.private.*",
    ".env.local",
    ".env.development",
]
